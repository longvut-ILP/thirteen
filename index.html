<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Tiến Lên Multiplayer - Fixed</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background: #1b5e20; color: white; font-family: sans-serif; text-align: center; }
        .setup-box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; margin: 20px auto; width: 300px; }
        button { padding: 10px; cursor: pointer; background: #ffeb3b; border: none; font-weight: bold; border-radius: 5px; }
        #room-id-display { font-weight: bold; color: #ffeb3b; }
        .error { color: #ff5252; font-size: 0.8rem; margin-top: 10px; }
    </style>
</head>
<body>

    <h1>Tiến Lên Multiplayer</h1>

    <div id="setup" class="setup-box">
        <div id="host-section">
            <button id="create-btn" onclick="startHost()">Create Room (Host)</button>
            <p>Room ID: <span id="room-id-display">...</span></p>
            <div id="error-log" class="error"></div>
        </div>
        <hr>
        <div id="join-section">
            <input type="text" id="join-id" placeholder="Enter Host ID">
            <button onclick="joinRoom()">Join Friend</button>
        </div>
    </div>

    <script>
        let peer;
        let connections = [];

        function startHost() {
            const display = document.getElementById('room-id-display');
            const errorLog = document.getElementById('error-log');
            
            display.innerText = "Connecting...";
            errorLog.innerText = "";

            // Initialize PeerJS
            // debug: 3 provides detailed console logs to help you troubleshoot
            peer = new Peer(null, { debug: 3 }); 

            peer.on('open', (id) => {
                display.innerText = id;
                document.getElementById('create-btn').disabled = true;
                console.log("My peer ID is: " + id);
            });

            peer.on('error', (err) => {
                console.error("PeerJS Error:", err);
                errorLog.innerText = "Error: " + err.type;
                display.innerText = "Failed";
            });

            peer.on('connection', (c) => {
                connections.push(c);
                console.log("New connection established!");
            });
        }

        function joinRoom() {
            const hostId = document.getElementById('join-id').value;
            if(!hostId) return alert("Please enter a Room ID");
            
            peer = new Peer();
            peer.on('open', () => {
                const conn = peer.connect(hostId);
                conn.on('open', () => console.log("Connected to host!"));
            });
            peer.on('error', (err) => alert("Connection failed: " + err.type));
        }
    </script>
</body>
</html>
