<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tiến Lên Multiplayer - Diagnostics</title>
    <script src="https://unpkg.com/peerjs@1.5.4/dist/peerjs.min.js"></script>
    <style>
        body { background: #1b5e20; color: white; font-family: sans-serif; text-align: center; }
        .box { background: rgba(0,0,0,0.3); padding: 20px; border-radius: 10px; margin: 20px auto; width: 350px; max-width: 90%; }
        button { padding: 10px; cursor: pointer; background: #ffeb3b; color: #333; border: none; font-weight: bold; border-radius: 5px; margin-top: 10px; }
        button:disabled { background: #888; cursor: not-allowed; }
        input { padding: 8px; margin-top: 5px; border-radius: 4px; border: none; width: 80%; }
        #room-id-display { font-weight: bold; color: #ffeb3b; }
        
        /* Diagnostic Log Styling */
        #error-log { 
            background: #000; 
            color: #0f0; 
            font-family: monospace; 
            font-size: 0.8rem; 
            margin-top: 15px; 
            padding: 10px; 
            border-radius: 5px; 
            text-align: left;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        ul { list-style-type: none; padding: 0; }
        li { background: rgba(255,255,255,0.1); margin: 5px 0; padding: 8px; border-radius: 4px; }
        
        /* Sections to toggle */
        #lobby-section, #game-section { display: none; }
    </style>
</head>
<body>

    <h1>Tiến Lên Multiplayer</h1>

    <div id="setup-section" class="box">
        <div id="host-section">
            <h3>Host a Game</h3>
            <input type="text" id="host-name" placeholder="Your Name (e.g., Alice)">
            <br>
            <button id="create-btn" onclick="startHost()">Create Room</button>
            <p>Room ID: <span id="room-id-display">...</span></p>
            
            <div id="error-log">Waiting for action...</div>
        </div>
        <hr>
        <div id="join-section">
            <h3>Join a Friend</h3>
            <input type="text" id="join-name" placeholder="Your Name (e.g., Bob)">
            <input type="text" id="join-id" placeholder="Enter Host ID">
            <br>
            <button onclick="joinRoom()">Join Room</button>
        </div>
    </div>

    <div id="lobby-section" class="box">
        <h2>Waiting Lobby</h2>
        
        <div style="background: #333; padding: 10px; border-radius: 5px; margin-bottom: 15px;">
            <p style="margin: 0; font-size: 0.9em; color: #ccc;">Share this Room ID with friends:</p>
            <span id="lobby-room-id" style="font-weight: bold; color: #ffeb3b; font-size: 1.2em; user-select: all;">...</span>
        </div>

        <p>Players Connected: <span id="player-count">1</span>/4</p>
        <ul id="player-list">
            </ul>
        <button id="start-game-btn" style="display: none;" onclick="startGame()">Start Game</button>
    </div>

    <div id="game-section" class="box" style="width: 800px; max-width: 95%;">
        <h2>Game Board</h2>
        <p>The game has started! Card UI goes here.</p>
        <div id="game-log" style="text-align: left; background: #000; padding: 10px; font-family: monospace;"></div>
    </div>

    <script>
        let peer;
        let hostConnection; 
        let clientConnections = []; 
        let isHost = false;
        let players = []; 

        // Custom function to print logs directly to the phone screen
        function debugLog(msg) {
            console.log(msg);
            const errorLog = document.getElementById('error-log');
            errorLog.innerText += "\n👉 " + msg;
        }

        // -----------------------------------------------------
        // HOST LOGIC
        // -----------------------------------------------------
        function startHost() {
            const myName = document.getElementById('host-name').value || "Host";
            const display = document.getElementById('room-id-display');
            const errorLog = document.getElementById('error-log');
            
            display.innerText = "Connecting...";
            errorLog.innerText = "Starting diagnostics..."; // Reset log

            debugLog("Step 1: Button clicked.");

            peer = new Peer(null, { 
                debug: 3, 
                config: {
                    'iceServers': [
                        { urls: 'stun:stun.l.google.com:19302' },
                        { urls: 'stun:stun1.l.google.com:19302' }
                    ]
                }
            }); 

            debugLog("Step 2: Peer created. Reaching out to server...");

            peer.on('open', (id) => {
                debugLog("Step 3: SUCCESS! ID Generated.");
                
                display.innerText = id;
                document.getElementById('lobby-room-id').innerText = id; 
                document.getElementById('create-btn').disabled = true;
                isHost = true;
                
                players.push(myName);
                
                document.getElementById('setup-section').style.display = "none";
                document.getElementById('lobby-section').style.display = "block";
                document.getElementById('start-game-btn').style.display = "inline-block"; 
                updateLobbyUI();
            });

            peer.on('error', (err) => {
                debugLog("❌ ERROR: " + err.type);
                display.innerText = "Failed";
            });

            // Listen for incoming client connections
            peer.on('connection', (conn) => {
                clientConnections.push(conn);
                conn.on('open', () => debugLog("New client connected!"));
                conn.on('data', (data) => {
                    if (data.type === 'JOIN_LOBBY') {
                        players.push(data.name);
                        updateLobbyUI();
                        broadcastToClients({ type: 'UPDATE_LOBBY_UI', players: players });
                    }
                });
            });
        }

        function broadcastToClients(dataObj) {
            clientConnections.forEach(conn => conn.send(dataObj));
        }

        function startGame() {
            document.getElementById('lobby-section').style.display = "none";
            document.getElementById('game-section').style.display = "block";
            broadcastToClients({ type: 'START_GAME' });
            document.getElementById('game-log').innerText += "\nHost started the game. Dealing cards...";
        }

        // -----------------------------------------------------
        // CLIENT LOGIC
        // -----------------------------------------------------
        function joinRoom() {
            const hostId = document.getElementById('join-id').value;
            const myName = document.getElementById('join-name').value || "Player";
            if(!hostId) return alert("Please enter a Room ID");
            
            peer = new Peer();
            
            peer.on('open', () => {
                hostConnection = peer.connect(hostId);
                hostConnection.on('open', () => {
                    document.getElementById('setup-section').style.display = "none";
                    document.getElementById('lobby-section').style.display = "block";
                    hostConnection.send({ type: 'JOIN_LOBBY', name: myName });
                });

                hostConnection.on('data', (data) => {
                    if (data.type === 'UPDATE_LOBBY_UI') {
                        players = data.players;
                        updateLobbyUI();
                    }
                    if (data.type === 'START_GAME') {
                        document.getElementById('lobby-section').style.display = "none";
                        document.getElementById('game-section').style.display = "block";
                        document.getElementById('game-log').innerText += "\nGame started! Waiting for cards...";
                    }
                });
            });
            peer.on('error', (err) => alert("Connection failed: " + err.type));
        }

        function updateLobbyUI() {
            document.getElementById('player-count').innerText = players.length;
            const list = document.getElementById('player-list');
            list.innerHTML = ""; 
            players.forEach(name => {
                let li = document.createElement('li');
                li.innerText = name;
                list.appendChild(li);
            });
        }
    </script>
</body>
</html>
